<!-- One Long Impersonation -- Platform Navigation Fragment -->
<nav class="platform-nav" id="platform-nav">
  <div class="platform-nav__inner">
    <a href="/site/" class="platform-nav__mark" title="One Long Impersonation">
      <svg class="platform-nav__pyramid" viewBox="0 0 24 20" width="18" height="15" aria-hidden="true">
        <polygon points="12,1 1,19 23,19" fill="none" stroke="#d4a017" stroke-width="1.5"/>
        <line x1="4.5" y1="13" x2="19.5" y2="13" stroke="#d4a017" stroke-width="0.7" opacity="0.6"/>
        <line x1="7" y1="7" x2="17" y2="7" stroke="#d4a017" stroke-width="0.7" opacity="0.4"/>
      </svg>
      <span class="platform-nav__name">The People v. The Rock Hall</span>
    </a>
    <div class="platform-nav__chapters" id="nav-chapters"></div>
    <span class="platform-nav__docket">Case No. 2026-001 <span class="platform-nav__docket-filed">Filed May 2026</span></span>
  </div>
</nav>
<style>
  .platform-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(20,20,43,0.95);
    border-bottom: 1px solid rgba(212,160,23,0.12);
    font-family: var(--mono, 'JetBrains Mono', monospace);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .platform-nav__inner {
    max-width: 1480px;
    margin: 0 auto;
    padding: 0 36px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .platform-nav__mark {
    display: flex; align-items: center; gap: 8px;
    color: var(--cream, #efe8d6);
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .platform-nav__mark:hover .platform-nav__pyramid polygon {
    fill: rgba(212,160,23,0.08);
  }
  .platform-nav__name {
    font-size: 9.5px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: var(--cream, #efe8d6);
  }
  .platform-nav__name::before {
    content: none;
  }
  .platform-nav__chapters {
    display: flex; gap: 2px;
    overflow-x: auto;
    flex: 1;
    justify-content: center;
  }
  .platform-nav__chapters a {
    color: var(--mute, #8a8aa3);
    text-decoration: none;
    padding: 12px 10px;
    white-space: nowrap;
    transition: color 0.15s;
    font-size: 9px;
    letter-spacing: 0.12em;
    position: relative;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .platform-nav__chapters a .nav-title {
    display: none;
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    color: var(--cream, #efe8d6);
    letter-spacing: 0.06em;
    background: rgba(20,20,43,0.95);
    border: 1px solid rgba(212,160,23,0.2);
    padding: 5px 10px;
    border-radius: 3px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 10;
  }
  .platform-nav__chapters a:hover {
    color: var(--cream, #efe8d6);
  }
  .platform-nav__chapters a:hover .nav-title {
    display: block;
  }
  .platform-nav__chapters a.is-active {
    color: var(--gold, #d4a017);
  }
  .platform-nav__chapters a.is-active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 10px; right: 10px;
    height: 2px;
    background: var(--gold, #d4a017);
  }
  .platform-nav__docket {
    color: var(--mute, #8a8aa3);
    white-space: nowrap;
    flex-shrink: 0;
    font-size: 8.5px;
    letter-spacing: 0.12em;
  }
  .platform-nav__docket-filed {
    color: rgba(138,138,163,0.5);
    margin-left: 8px;
  }
  @media (max-width: 768px) {
    .platform-nav__inner { padding: 0 16px; }
    .platform-nav__chapters { display: none; }
    .platform-nav__docket { display: none; }
  }
</style>
<script>
(function() {
  fetch('/chapters.json')
    .then(function(r) { return r.json(); })
    .catch(function() {
      return fetch('../chapters.json').then(function(r) { return r.json(); });
    })
    .then(function(data) {
      var el = document.getElementById('nav-chapters');
      if (!el || !data || !data.chapters) return;
      var current = window.location.pathname;
      data.chapters.forEach(function(ch) {
        var a = document.createElement('a');
        a.href = ch.url;
        a.innerHTML = '<span class="nav-num">' + ch.number + '</span><span class="nav-title">' + ch.title + '</span>';
        a.title = 'Chapter ' + ch.number + ': ' + ch.title;
        if (current.indexOf(ch.slug) !== -1 ||
            (ch.slug === 'opening' && current.indexOf('00-opening') !== -1)) {
          a.className = 'is-active';
        }
        el.appendChild(a);
      });
    })
    .catch(function() {});
})();
</script>
