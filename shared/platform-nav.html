<!-- One Long Impersonation -- Platform Navigation Fragment -->
<!-- Include this at the top of every chapter's index.html -->
<nav class="platform-nav" id="platform-nav">
  <div class="platform-nav__inner">
    <a href="/site/" class="platform-nav__mark">
      <span class="platform-nav__dot">&#9679;</span>
      <span class="platform-nav__title">onelongimpersonation.report</span>
    </a>
    <div class="platform-nav__chapters" id="nav-chapters"></div>
    <span class="platform-nav__version">v1.0 / May 2026</span>
  </div>
</nav>
<style>
  .platform-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(20,20,43,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(212,160,23,0.15);
    font-family: var(--mono, 'JetBrains Mono', monospace);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .platform-nav__inner {
    max-width: 1480px;
    margin: 0 auto;
    padding: 14px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .platform-nav__mark {
    display: flex; align-items: center; gap: 8px;
    color: var(--cream, #efe8d6);
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .platform-nav__dot { color: var(--gold, #d4a017); }
  .platform-nav__chapters {
    display: flex; gap: 6px;
    overflow-x: auto;
    flex: 1;
    justify-content: center;
  }
  .platform-nav__chapters a {
    color: var(--mute, #8a8aa3);
    text-decoration: none;
    padding: 4px 8px;
    border-radius: 3px;
    white-space: nowrap;
    transition: color 0.15s, background 0.15s;
    font-size: 9.5px;
  }
  .platform-nav__chapters a:hover { color: var(--cream, #efe8d6); }
  .platform-nav__chapters a.is-active {
    color: var(--gold, #d4a017);
    background: rgba(212,160,23,0.1);
  }
  .platform-nav__version {
    color: var(--mute, #8a8aa3);
    white-space: nowrap;
    flex-shrink: 0;
  }
  @media (max-width: 768px) {
    .platform-nav__inner { padding: 12px 16px; }
    .platform-nav__chapters { display: none; }
    .platform-nav__version { display: none; }
  }
</style>
<script>
(function() {
  // Load chapter nav from chapters.json
  fetch('/chapters.json')
    .then(function(r) { return r.json(); })
    .catch(function() {
      // Fallback: try relative path
      return fetch('../chapters.json').then(function(r) { return r.json(); });
    })
    .then(function(data) {
      var el = document.getElementById('nav-chapters');
      if (!el || !data || !data.chapters) return;
      var current = window.location.pathname;
      data.chapters.forEach(function(ch) {
        var a = document.createElement('a');
        a.href = ch.url;
        a.textContent = ch.number;
        a.title = ch.title;
        if (current.indexOf(ch.slug) !== -1) a.className = 'is-active';
        el.appendChild(a);
      });
    })
    .catch(function() { /* nav gracefully degrades */ });
})();
</script>
