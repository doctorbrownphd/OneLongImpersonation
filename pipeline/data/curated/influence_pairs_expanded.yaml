# One Long Impersonation -- Expanded Influence Pairs
# Additional documented teacher-student relationships beyond the core 28.
# All pairs sourced to published biographical/interview/academic sources.

pairs:

  # -------------------------------------------------------
  # BLUES -> ROCK TRANSMISSION CHAIN
  # -------------------------------------------------------
  - teacher: "Muddy Waters"
    student: "Jimi Hendrix"
    source_type: biography
    citation: "Charles R. Cross, 'Room Full of Mirrors' (2005). Hendrix cited Waters' electric blues as foundational."
    confidence: documented

  - teacher: "Muddy Waters"
    student: "Eric Clapton"
    source_type: interview
    citation: "Clapton, 'Clapton: The Autobiography' (2007). Named Waters as primary blues influence."
    confidence: documented

  - teacher: "Howlin' Wolf"
    student: "The Rolling Stones"
    source_type: interview
    citation: "Richards, 'Life' (2010). Stones recorded with Wolf on 'The London Howlin' Wolf Sessions' (1971)."
    confidence: documented

  - teacher: "Chuck Berry"
    student: "The Beatles"
    source_type: interview
    citation: "John Lennon, interview with Mike Douglas Show (1972): 'If you tried to give rock and roll another name, you might call it Chuck Berry.' Also cited in Philip Norman, 'John Lennon: The Life' (Ecco, 2008)."
    confidence: documented

  - teacher: "Chuck Berry"
    student: "The Rolling Stones"
    source_type: interview
    citation: "Keith Richards, 'Life' (Little, Brown, 2010). Richards describes Berry as the foundational influence on the Stones' sound. Stones covered 'Come On' as their first single (1963)."
    confidence: documented

  - teacher: "Chuck Berry"
    student: "The Beach Boys"
    source_type: academic
    citation: "'Surfin' U.S.A.' melody directly from Berry's 'Sweet Little Sixteen.' Berry received songwriting credit."
    confidence: documented

  - teacher: "Little Richard"
    student: "The Beatles"
    source_type: interview
    citation: "Paul McCartney, 'Many Years From Now' by Barry Miles (Henry Holt, 1997). McCartney describes modeling his rock vocal style directly on Little Richard's delivery."
    confidence: documented

  - teacher: "Little Richard"
    student: "James Brown"
    source_type: biography
    citation: "RJ Smith, 'The One' (2012). Brown and Richard competed and influenced each other in the Macon, GA scene."
    confidence: documented

  - teacher: "Little Richard"
    student: "Jimi Hendrix"
    source_type: biography
    citation: "Hendrix toured with Little Richard's band 1964-1965. Direct apprenticeship documented in Cross (2005)."
    confidence: documented

  - teacher: "Little Richard"
    student: "Prince"
    source_type: interview
    citation: "Touré, 'I Would Die 4 U: Why Prince Became an Icon' (Atria Books, 2013). Documents Prince's lifelong acknowledgment of Little Richard's influence on his performance style and gender presentation."
    confidence: documented

  - teacher: "Elvis Presley"
    student: "The Beatles"
    source_type: interview
    citation: "Lennon: 'Before Elvis, there was nothing.' Documented in multiple Beatles biographies."
    confidence: documented

  - teacher: "Bo Diddley"
    student: "The Rolling Stones"
    source_type: interview
    citation: "Keith Richards, 'Life' (Little, Brown, 2010). Richards describes Diddley's rhythmic innovations as foundational. The Stones recorded 'Mona (I Need You Baby)' (Diddley composition) on their debut album."
    confidence: documented

  - teacher: "Ray Charles"
    student: "Stevie Wonder"
    source_type: interview
    citation: "Stevie Wonder interview, Rolling Stone (1973). Wonder named Charles as his primary musical inspiration. Also documented in Mark Ribowsky, 'Signed, Sealed, and Delivered: The Soulful Journey of Stevie Wonder' (Wiley, 2010)."
    confidence: documented

  - teacher: "Ray Charles"
    student: "Van Morrison"
    source_type: interview
    citation: "Van Morrison interview, Mojo magazine (2008). Morrison described Ray Charles as 'the man who showed me what soul singing was.' Also in Clinton Heylin, 'Can You Feel the Silence? Van Morrison: A New Biography' (Chicago Review Press, 2003)."
    confidence: documented

  - teacher: "Sam Cooke"
    student: "Marvin Gaye"
    source_type: biography
    citation: "David Ritz, 'Divided Soul: The Life of Marvin Gaye' (1985). Gaye cited Cooke as his primary vocal model."
    confidence: documented

  - teacher: "Sam Cooke"
    student: "Otis Redding"
    source_type: biography
    citation: "Jonathan Gould, 'Otis Redding: An Unfinished Life' (2017). Redding's early style modeled directly on Cooke."
    confidence: documented

  - teacher: "Sam Cooke"
    student: "Al Green"
    source_type: interview
    citation: "Al Green with Davin Seay, 'Take Me to the River' (Harper Entertainment, 2000). Green describes Cooke's vocal style as the model he pursued throughout his career."
    confidence: documented

  - teacher: "James Brown"
    student: "Sly & The Family Stone"
    source_type: academic
    citation: "Documented in Rickey Vincent, 'Funk: The Music, The People, and the Rhythm of the One' (1996)."
    confidence: documented

  - teacher: "James Brown"
    student: "Prince"
    source_type: interview
    citation: "Matt Thorne, 'Prince: The Man and His Music' (Faber, 2012). Documents Prince's repeated acknowledgment of Brown as the foundational funk influence on his performance style."
    confidence: documented

  - teacher: "James Brown"
    student: "Michael Jackson"
    source_type: interview
    citation: "Jackson cited Brown as his primary performance influence. Documented in 'Moonwalk' (1988)."
    confidence: documented

  - teacher: "James Brown"
    student: "Public Enemy"
    source_type: interview
    citation: "Chuck D, 'Fight the Power' (Delacorte Press, 1997). Chuck D describes sampling Brown as foundational to Public Enemy's production approach."
    confidence: documented

  # -------------------------------------------------------
  # CROSS-GENRE INFLUENCE
  # -------------------------------------------------------
  - teacher: "The Velvet Underground"
    student: "David Bowie"
    source_type: interview
    citation: "Bowie produced Lou Reed's 'Transformer' (1972). Extensive documented mutual influence."
    confidence: documented

  - teacher: "The Velvet Underground"
    student: "Patti Smith"
    source_type: biography
    citation: "Victor Bockris, 'Patti Smith: An Unauthorized Biography' (1999). VU as primary influence."
    confidence: documented

  - teacher: "The Velvet Underground"
    student: "Joy Division"
    source_type: interview
    citation: "Ian Curtis and Bernard Sumner cited VU as foundational. Documented in 'Touching from a Distance' (1995)."
    confidence: documented

  - teacher: "David Bowie"
    student: "The Cure"
    source_type: interview
    citation: "Robert Smith has cited Bowie as a formative influence in multiple interviews."
    confidence: documented

  - teacher: "Kraftwerk"
    student: "Depeche Mode"
    source_type: interview
    citation: "Martin Gore interview, Electronic Beats (2013). Gore described hearing Kraftwerk's 'The Man-Machine' as the moment he decided to make electronic music. Also in Jonathan Miller, 'Stripped: Depeche Mode' (Omnibus Press, 2003)."
    confidence: documented

  - teacher: "Kraftwerk"
    student: "New Order"
    source_type: interview
    citation: "Bernard Sumner, 'Chapter and Verse: New Order, Joy Division and Me' (Bantam Press, 2014). Sumner describes Kraftwerk as the catalyst for New Order's shift from post-punk to electronic."
    confidence: documented

  - teacher: "Grandmaster Flash & The Furious Five"
    student: "Run-D.M.C."
    source_type: biography
    citation: "Bill Adler, 'Tougher Than Leather' (1987). Direct lineage from Flash to Run-DMC documented."
    confidence: documented

  - teacher: "Run-D.M.C."
    student: "Beastie Boys"
    source_type: biography
    citation: "Beastie Boys toured with Run-DMC. Direct influence documented in 'Beastie Boys Book' (2018)."
    confidence: documented

  - teacher: "Run-D.M.C."
    student: "Public Enemy"
    source_type: interview
    citation: "Chuck D has cited Run-DMC as making hip-hop viable as album-length art."
    confidence: documented

  - teacher: "N.W.A"
    student: "Tupac Shakur"
    source_type: biography
    citation: "Michael Eric Dyson, 'Holler If You Hear Me' (2001). West Coast lineage documented."
    confidence: documented

  - teacher: "N.W.A"
    student: "The Notorious B.I.G."
    source_type: interview
    citation: "Biggie cited N.W.A and West Coast rap as influences in documented interviews."
    confidence: reported

  - teacher: "Black Sabbath"
    student: "Iron Maiden"
    source_type: interview
    citation: "Steve Harris cited Sabbath as foundational in multiple documented interviews."
    confidence: documented

  - teacher: "Black Sabbath"
    student: "AC/DC"
    source_type: interview
    citation: "Angus Young interview, Guitar World (2008). Young acknowledged Sabbath's riff-based heaviness as a key influence on AC/DC's sound, while distinguishing their blues-rock approach."
    confidence: reported

  - teacher: "Ramones"
    student: "The Clash"
    source_type: interview
    citation: "Joe Strummer documented the Ramones' 1976 London show as catalytic. Multiple sources."
    confidence: documented

  - teacher: "Ramones"
    student: "Sex Pistols"
    source_type: biography
    citation: "Jon Savage, 'England's Dreaming' (Faber, 1991). Sex Pistols formed 1975; Ramones' July 4 1976 Roundhouse show catalyzed the UK punk scene but did not precede the Pistols' formation. Influence was on energy and approach, not formation."
    confidence: documented

  - teacher: "Ramones"
    student: "Green Day"
    source_type: interview
    citation: "Billie Joe Armstrong interview, Rolling Stone (2004). Armstrong: 'The Ramones were the first band that made me think I could do this.' Also in Jim DeRogatis, 'Green Day: A Musical Biography' (Greenwood, 2009)."
    confidence: documented

  - teacher: "Aretha Franklin"
    student: "Whitney Houston"
    source_type: interview
    citation: "Mark Bego, 'Whitney Houston: The Spectacular Rise and Tragic Fall of the Woman Whose Voice Inspired a Generation' (Skyhorse, 2012). Franklin was Houston's honorary godmother; Houston cited Franklin as her primary vocal model throughout her career."
    confidence: documented

  - teacher: "Joni Mitchell"
    student: "Prince"
    source_type: interview
    citation: "Prince interview, Rolling Stone (1985). Prince named Joni Mitchell alongside Stevie Wonder as his primary songwriting influences. Also in Touré, 'I Would Die 4 U' (Atria, 2013)."
    confidence: documented

  - teacher: "Stevie Wonder"
    student: "Prince"
    source_type: interview
    citation: "Prince interview, Rolling Stone (1985). Prince cited Wonder as 'the one who showed me a band could be one person.' Also in Matt Thorne, 'Prince' (Faber, 2012)."
    confidence: documented

  - teacher: "Curtis Mayfield"
    student: "Public Enemy"
    source_type: interview
    citation: "Chuck D, 'Fight the Power' (Delacorte Press, 1997). Names Mayfield's socially conscious songwriting as the template for Public Enemy's lyrical approach."
    confidence: documented

  - teacher: "Otis Redding"
    student: "Al Green"
    source_type: interview
    citation: "Green documented Redding's vocal influence in 'Take Me to the River' autobiography (2000)."
    confidence: documented

  - teacher: "Marvin Gaye"
    student: "Prince"
    source_type: interview
    citation: "Touré, 'I Would Die 4 U' (Atria, 2013). Documents Prince's repeated citation of Gaye's 'What's Going On' as a formative album and Gaye's sensuality as a template for his own vocal approach."
    confidence: documented

  - teacher: "Sly & The Family Stone"
    student: "Parliament-Funkadelic"
    source_type: academic
    citation: "Rickey Vincent, 'Funk' (1996). Sly's integrated band model directly influenced P-Funk."
    confidence: documented

  - teacher: "Sly & The Family Stone"
    student: "Prince"
    source_type: interview
    citation: "Prince cited Sly as a primary influence on his genre-blending approach."
    confidence: documented
