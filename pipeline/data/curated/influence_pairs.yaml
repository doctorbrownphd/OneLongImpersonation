# One Long Impersonation -- Curated Influence Pairs
# Hand-verified teacher-student relationships with documented citations.
# Every pair has a primary source citation.
#
# Format:
#   teacher: Artist name (must match artists table)
#   student: Artist name (must match artists table)
#   source_type: interview | liner_notes | biography | musicbrainz | academic
#   citation: Specific source citation
#   url: Source URL if available
#   confidence: documented | reported | estimated
#
# These supplement MusicBrainz relationships. MusicBrainz provides the
# bulk graph; this file provides the prosecution's key exhibit pairs
# with precise sourcing that MusicBrainz does not capture.

pairs:

  # -------------------------------------------------------
  # THE FOUNDING EXHIBIT -- Sister Rosetta Tharpe
  # -------------------------------------------------------
  - teacher: "Sister Rosetta Tharpe"
    student: "Chuck Berry"
    source_type: interview
    citation: >
      Chuck Berry, Rock and Roll Hall of Fame induction ceremony acceptance
      speech, January 23, 1986: "My whole career has been one long Sister
      Rosetta Tharpe impersonation."
    url: null
    confidence: documented

  - teacher: "Sister Rosetta Tharpe"
    student: "Little Richard"
    source_type: biography
    citation: >
      Gayle Wald, "Shout, Sister, Shout! The Untold Story of Rock-and-Roll
      Trailblazer Sister Rosetta Tharpe" (Beacon Press, 2007). Documented
      that Little Richard cited Tharpe as his primary musical influence.
    url: null
    confidence: documented

  - teacher: "Sister Rosetta Tharpe"
    student: "Elvis Presley"
    source_type: biography
    citation: >
      Gayle Wald, "Shout, Sister, Shout!" (2007). Documents Presley's
      attendance at Tharpe's Cotton Club performances in Memphis as a
      teenager. Also cited in Peter Guralnick, "Last Train to Memphis"
      (1994).
    url: null
    confidence: documented

  - teacher: "Sister Rosetta Tharpe"
    student: "Jerry Lee Lewis"
    source_type: interview
    citation: >
      Jerry Lee Lewis interview in "The Killer" documentary (2022).
      Lewis described hearing Tharpe play as a formative influence on
      his piano and vocal style.
    url: null
    confidence: reported

  # -------------------------------------------------------
  # BIG MAMA THORNTON
  # -------------------------------------------------------
  - teacher: "Big Mama Thornton"
    student: "Elvis Presley"
    source_type: academic
    citation: >
      Big Mama Thornton recorded "Hound Dog" (Peacock Records, 1952),
      written by Leiber and Stoller specifically for her. Presley's 1956
      version became the hit. Documented in Michael T. Bertrand, "Race,
      Rock, and Elvis" (University of Illinois Press, 2000).
    url: null
    confidence: documented
    notes: >
      Thornton was never inducted into the Rock and Roll Hall of Fame.
      Presley was in the first class (1986).

  - teacher: "Big Mama Thornton"
    student: "Janis Joplin"
    source_type: biography
    citation: >
      Holly George-Warren, "Janis: Her Life and Music" (Simon & Schuster,
      2019). Documents Joplin's lifelong acknowledgment of Thornton's
      influence, particularly on "Ball and Chain" which Thornton wrote
      and first recorded.
    url: null
    confidence: documented

  # -------------------------------------------------------
  # LOUIS JORDAN
  # -------------------------------------------------------
  - teacher: "Louis Jordan"
    student: "Chuck Berry"
    source_type: biography
    citation: >
      John Collis, "Chuck Berry: The Biography" (Aurum Press, 2002).
      Berry frequently cited Jordan's jump blues as the direct template
      for his approach to rhythm and showmanship.
    url: null
    confidence: documented

  - teacher: "Louis Jordan"
    student: "Little Richard"
    source_type: interview
    citation: >
      Little Richard interview in "The Life and Times of Little Richard"
      by Charles White (Da Capo Press, 1984). Richard cited Jordan as a
      key influence on his vocal delivery and stage presence.
    url: null
    confidence: documented

  - teacher: "Louis Jordan"
    student: "Ray Charles"
    source_type: biography
    citation: >
      Michael Lydon, "Ray Charles: Man and Music" (Routledge, 2004).
      Charles cited Jordan's crossover between jazz, blues, and popular
      music as the model for his own genre-blending approach.
    url: null
    confidence: documented

  - teacher: "Louis Jordan"
    student: "James Brown"
    source_type: biography
    citation: >
      RJ Smith, "The One: The Life and Music of James Brown" (Gotham
      Books, 2012). Brown cited Jordan's rhythmic precision and audience
      engagement as foundational influences.
    url: null
    confidence: reported

  # -------------------------------------------------------
  # BLUES TO ROCK -- The teacher-student chain
  # -------------------------------------------------------
  - teacher: "Muddy Waters"
    student: "The Rolling Stones"
    source_type: interview
    citation: >
      Keith Richards, "Life" (Little, Brown and Company, 2010): "Muddy
      Waters was everything to us." The band's name is taken from
      Waters' 1950 song "Rollin' Stone."
    url: null
    confidence: documented

  - teacher: "Muddy Waters"
    student: "Led Zeppelin"
    source_type: interview
    citation: >
      Robert Plant interviews documented in "Led Zeppelin: The Biography"
      by Bob Spitz (Penguin, 2021). Plant and Page both cited Waters as
      a primary influence. Zeppelin covered "You Shook Me" on their debut.
    url: null
    confidence: documented

  - teacher: "Howlin' Wolf"
    student: "Led Zeppelin"
    source_type: biography
    citation: >
      Bob Spitz, "Led Zeppelin: The Biography" (2021). "The Lemon Song"
      is directly derived from Howlin' Wolf's "Killing Floor" (1964).
      Wolf received a belated songwriting credit after legal action.
    url: null
    confidence: documented

  - teacher: "Robert Johnson"
    student: "The Rolling Stones"
    source_type: interview
    citation: >
      Keith Richards, "Life" (2010). Richards described hearing Johnson's
      recordings as a transformative experience. The Stones recorded
      Johnson's "Love in Vain" and "Stop Breakin' Down Blues."
    url: null
    confidence: documented

  - teacher: "Robert Johnson"
    student: "Led Zeppelin"
    source_type: academic
    citation: >
      Led Zeppelin's "Travelling Riverside Blues" directly adapts Johnson's
      1937 recording. Plant cited Johnson extensively in interviews.
      Documented in Elijah Wald, "Escaping the Delta: Robert Johnson and
      the Invention of the Blues" (Amistad, 2004).
    url: null
    confidence: documented

  # -------------------------------------------------------
  # GOSPEL TO SOUL
  # -------------------------------------------------------
  - teacher: "Mahalia Jackson"
    student: "Aretha Franklin"
    source_type: biography
    citation: >
      David Ritz, "Respect: The Life of Aretha Franklin" (Little, Brown,
      2014). Jackson was a family friend of the Franklins and a direct
      vocal influence on the young Aretha. Franklin performed at Jackson's
      funeral in 1972.
    url: null
    confidence: documented
    notes: >
      Jackson inducted as Early Influence 1997. Franklin inducted 1987.
      Jackson never inducted as Performer.

  - teacher: "The Soul Stirrers"
    student: "Sam Cooke"
    source_type: biography
    citation: >
      Peter Guralnick, "Dream Boogie: The Triumph of Sam Cooke" (Little,
      Brown, 2005). Cooke was the lead singer of the Soul Stirrers
      (1950-1957) before his solo career. Direct lineage.
    url: null
    confidence: documented

  # -------------------------------------------------------
  # METAL LINEAGE
  # -------------------------------------------------------
  - teacher: "Black Sabbath"
    student: "Metallica"
    source_type: interview
    citation: >
      James Hetfield and Lars Ulrich in numerous documented interviews
      cited Black Sabbath as the foundational influence on thrash metal.
      Metallica covered "Sabbra Cadabra" on "Garage Inc." (1998).
    url: null
    confidence: documented

  - teacher: "Black Sabbath"
    student: "Judas Priest"
    source_type: interview
    citation: >
      Rob Halford interview, Metal Hammer (2018): acknowledged Sabbath
      as the band that opened the door for British heavy metal. Both
      bands emerged from Birmingham within two years of each other.
    url: null
    confidence: documented

  - teacher: "Led Zeppelin"
    student: "Black Sabbath"
    source_type: interview
    citation: >
      Tony Iommi, "Iron Man: My Journey Through Heaven and Hell with
      Black Sabbath" (Da Capo Press, 2011). Iommi documented the
      cross-pollination between Zeppelin and Sabbath in the Birmingham
      scene, with Zeppelin's heavy riff-based approach informing
      Sabbath's direction.
    url: null
    confidence: reported

  # -------------------------------------------------------
  # THE INK SPOTS -- doo-wop to everything
  # -------------------------------------------------------
  - teacher: "The Ink Spots"
    student: "The Platters"
    source_type: academic
    citation: >
      Marv Goldberg, "More Than Words Can Say: The Ink Spots and Their
      Music" (Scarecrow Press, 2005). The Ink Spots' vocal harmony
      template directly shaped the doo-wop tradition that produced
      the Platters, the Drifters, and the entire vocal group era.
    url: null
    confidence: documented
    notes: >
      The Ink Spots were inducted as Early Influence in 1989.
      Their influence on the vocal harmony tradition that runs through
      the entire inducted roster is documented throughout musicological
      literature but the Hall has never fully acknowledged the lineage.

  - teacher: "The Ink Spots"
    student: "The Drifters"
    source_type: academic
    citation: >
      Bill Millar, "The Drifters: The Rise and Fall of the Black Vocal
      Group" (Macmillan, 1971). Documents the direct influence of Ink
      Spots harmony arrangements on the Drifters' vocal style.
    url: null
    confidence: documented

  # -------------------------------------------------------
  # ADDITIONAL DOCUMENTED PAIRS
  # -------------------------------------------------------
  - teacher: "Charley Patton"
    student: "Muddy Waters"
    source_type: biography
    citation: >
      Robert Palmer, "Deep Blues" (Viking, 1981). Documents that Waters
      learned guitar directly from Son House, who was Patton's protege.
      The Patton-House-Waters lineage is the central chain of Delta
      blues transmission.
    url: null
    confidence: documented

  - teacher: "B.B. King"
    student: "Jimi Hendrix"
    source_type: interview
    citation: >
      Hendrix cited King as a primary influence in interviews documented
      in Charles R. Cross, "Room Full of Mirrors: A Biography of Jimi
      Hendrix" (Hyperion, 2005).
    url: null
    confidence: documented

  - teacher: "B.B. King"
    student: "Eric Clapton"
    source_type: interview
    citation: >
      Eric Clapton, "Clapton: The Autobiography" (Broadway Books, 2007).
      Clapton described King as "the most important artist the blues has
      ever produced" and cited him as his primary influence.
    url: null
    confidence: documented

  - teacher: "Curtis Mayfield"
    student: "Bob Marley"
    source_type: biography
    citation: >
      Timothy White, "Catch a Fire: The Life of Bob Marley" (Henry Holt,
      1983, revised 2006). Documents Marley's deep engagement with
      Mayfield's music, particularly the social consciousness and
      falsetto vocal technique.
    url: null
    confidence: reported

  - teacher: "Nina Simone"
    student: "Aretha Franklin"
    source_type: interview
    citation: >
      Aretha Franklin interview, Essence magazine (2008). Franklin cited
      Simone as a vocal and artistic inspiration, particularly Simone's
      refusal to compromise her artistic vision.
    url: null
    confidence: reported
    notes: >
      Simone inducted 2018. Franklin inducted 1987. Thirty-one year gap.

  - teacher: "Fats Domino"
    student: "The Beatles"
    source_type: interview
    citation: >
      Paul McCartney interview, BBC Radio 2 (2017): "I owe a lot to
      Fats Domino. I used his style on 'Lady Madonna.' He was a massive
      influence." John Lennon also cited Domino in multiple interviews.
    url: null
    confidence: documented
