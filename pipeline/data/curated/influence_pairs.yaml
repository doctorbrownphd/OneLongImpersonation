    url: null
    confidence: reported

  # -------------------------------------------------------
  # BLUES TO ROCK -- The teacher-student chain
  # -------------------------------------------------------
  - teacher: "Muddy Waters"
    student: "The Rolling Stones"
    source_type: interview
    citation: >
      Keith Richards, "Life" (Little, Brown and Company, 2010): "Muddy
      Waters was everything to us." The band's name is taken from
      Waters' 1950 song "Rollin' Stone."
    url: null
    confidence: documented

  - teacher: "Muddy Waters"
    student: "Led Zeppelin"
    source_type: interview
    citation: >
      Robert Plant interviews documented in "Led Zeppelin: The Biography"
      by Bob Spitz (Penguin, 2021). Plant and Page both cited Waters as
      a primary influence. Zeppelin covered "You Shook Me" on their debut.
    url: null
    confidence: documented

  - teacher: "Howlin' Wolf"
    student: "Led Zeppelin"
    source_type: biography
    citation: >
      Bob Spitz, "Led Zeppelin: The Biography" (2021). "The Lemon Song"
      is directly derived from Howlin' Wolf's "Killing Floor" (1964).
      Wolf received a belated songwriting credit after legal action.
    url: null
    confidence: documented

  - teacher: "Robert Johnson"
    student: "The Rolling Stones"
    source_type: interview
    citation: >
      Keith Richards, "Life" (2010). Richards described hearing Johnson's
      recordings as a transformative experience. The Stones recorded
      Johnson's "Love in Vain" and "Stop Breakin' Down Blues."
    url: null
    confidence: documented

  - teacher: "Robert Johnson"
    student: "Led Zeppelin"
    source_type: academic
    citation: >
      Led Zeppelin's "Travelling Riverside Blues" directly adapts Johnson's
      1937 recording. Plant cited Johnson extensively in interviews.
      Documented in Elijah Wald, "Escaping the Delta: Robert Johnson and
      the Invention of the Blues" (Amistad, 2004).
    url: null
    confidence: documented

  # -------------------------------------------------------
  # GOSPEL TO SOUL
  # -------------------------------------------------------
  - teacher: "Mahalia Jackson"
    student: "Aretha Franklin"
    source_type: biography
    citation: >
      David Ritz, "Respect: The Life of Aretha Franklin" (Little, Brown,
      2014). Jackson was a family friend of the Franklins and a direct
      vocal influence on the young Aretha. Franklin performed at Jackson's
      funeral in 1972.
    url: null
    confidence: documented
    notes: >
      Jackson inducted as Early Influence 1997. Franklin inducted 1987.
      Jackson never inducted as Performer.

  - teacher: "The Soul Stirrers"
    student: "Sam Cooke"
    source_type: biography
    citation: >
      Peter Guralnick, "Dream Boogie: The Triumph of Sam Cooke" (Little,
      Brown, 2005). Cooke was the lead singer of the Soul Stirrers
      (1950-1957) before his solo career. Direct lineage.
    url: null
    confidence: documented

  # -------------------------------------------------------
  # METAL LINEAGE
  # -------------------------------------------------------
  - teacher: "Black Sabbath"
    student: "Metallica"
    source_type: interview
    citation: >
      James Hetfield and Lars Ulrich in numerous documented interviews
      cited Black Sabbath as the foundational influence on thrash metal.
      Metallica covered "Sabbra Cadabra" on "Garage Inc." (1998).
    url: null
    confidence: documented

  - teacher: "Black Sabbath"
    student: "Judas Priest"
    source_type: interview
    citation: >
      Rob Halford interview, Metal Hammer (2018): acknowledged Sabbath
      as the band that opened the door for British heavy metal. Both
      bands emerged from Birmingham within two years of each other.
    url: null
    confidence: documented

  - teacher: "Led Zeppelin"
    student: "Black Sabbath"
    source_type: interview
    citation: >
      Tony Iommi, "Iron Man: My Journey Through Heaven and Hell with
      Black Sabbath" (Da Capo Press, 2011). Iommi documented the
      cross-pollination between Zeppelin and Sabbath in the Birmingham
      scene, with Zeppelin's heavy riff-based approach informing
      Sabbath's direction.
    url: null
    confidence: reported

  # -------------------------------------------------------
  # THE INK SPOTS -- doo-wop to everything
  # -------------------------------------------------------
  - teacher: "The Ink Spots"
    student: "The Platters"
    source_type: academic
    citation: >
      Marv Goldberg, "More Than Words Can Say: The Ink Spots and Their
      Music" (Scarecrow Press, 2005). The Ink Spots' vocal harmony
      template directly shaped the doo-wop tradition that produced
      the Platters, the Drifters, and the entire vocal group era.
    url: null
    confidence: documented
    notes: >
      The Ink Spots were inducted as Early Influence in 1989.
      Their influence on the vocal harmony tradition that runs through
      the entire inducted roster is documented throughout musicological
      literature but the Hall has never fully acknowledged the lineage.

  - teacher: "The Ink Spots"
    student: "The Drifters"
    source_type: academic
    citation: >
      Bill Millar, "The Drifters: The Rise and Fall of the Black Vocal
      Group" (Macmillan, 1971). Documents the direct influence of Ink
      Spots harmony arrangements on the Drifters' vocal style.
    url: null
    confidence: documented

  # -------------------------------------------------------
  # ADDITIONAL DOCUMENTED PAIRS
  # -------------------------------------------------------
  - teacher: "Charley Patton"
    student: "Muddy Waters"
    source_type: biography
    citation: >
      Robert Palmer, "Deep Blues" (Viking, 1981). The influence chain
      is indirect: Patton taught Son House, Son House taught Waters.
      This pair documents the lineage, not a direct teacher-student
      relationship. The Patton-House-Waters chain is the central
      transmission line of Delta blues.
    url: null
    confidence: documented
    notes: >
      Indirect influence via Son House. Pair retained because Patton's
      style transmitted to Waters through the documented lineage.

  - teacher: "B.B. King"
    student: "Jimi Hendrix"
    source_type: interview
    citation: >
      Hendrix cited King as a primary influence in interviews documented
      in Charles R. Cross, "Room Full of Mirrors: A Biography of Jimi
      Hendrix" (Hyperion, 2005).
    url: null
    confidence: documented

  - teacher: "B.B. King"
    student: "Eric Clapton"
    source_type: interview
    citation: >
      Eric Clapton, "Clapton: The Autobiography" (Broadway Books, 2007).
      Clapton described King as "the most important artist the blues has
      ever produced" and cited him as his primary influence.
    url: null
    confidence: documented

  - teacher: "Curtis Mayfield"
    student: "Bob Marley"
    source_type: biography
    citation: >
      Timothy White, "Catch a Fire: The Life of Bob Marley" (Henry Holt,
