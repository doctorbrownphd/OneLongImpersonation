# One Long Impersonation -- Curated Influence Pairs
# Hand-verified teacher-student relationships with documented citations.
# Every pair has a primary source citation.
#
# Format:
#   teacher: Artist name (must match artists table)
#   student: Artist name (must match artists table)
#   source_type: interview | liner_notes | biography | musicbrainz | academic
#   citation: Specific source citation
#   url: Source URL if available
#   confidence: documented | reported | estimated
#
# These supplement MusicBrainz relationships. MusicBrainz provides the
# bulk graph; this file provides the prosecution's key exhibit pairs
# with precise sourcing that MusicBrainz does not capture.

pairs:

  # -------------------------------------------------------
  # THE FOUNDING EXHIBIT -- Sister Rosetta Tharpe
  # -------------------------------------------------------
  - teacher: "Sister Rosetta Tharpe"
    student: "Chuck Berry"
    source_type: interview
    citation: >
      Statement widely attributed to Chuck Berry acknowledging Tharpe's
      foundational influence on his guitar style and performance approach.
      Documented in Gayle Wald, "Shout, Sister, Shout!" (Beacon Press,
      2007) and multiple secondary sources. The specific verbatim quote
      and its precise occasion are disputed; Berry's acknowledgment of
      Tharpe's influence is documented across multiple sources.
    url: null
    confidence: reported

  - teacher: "Sister Rosetta Tharpe"
    student: "Little Richard"
    source_type: biography
    citation: >
      Gayle Wald, "Shout, Sister, Shout! The Untold Story of Rock-and-Roll
      Trailblazer Sister Rosetta Tharpe" (Beacon Press, 2007). Documented
      that Little Richard cited Tharpe as his primary musical influence.
    url: null
    confidence: documented

  - teacher: "Sister Rosetta Tharpe"
    student: "Elvis Presley"
    source_type: biography
    citation: >
      Gayle Wald, "Shout, Sister, Shout!" (2007). Documents Presley's
      attendance at Tharpe's Cotton Club performances in Memphis as a
      teenager. Also cited in Peter Guralnick, "Last Train to Memphis"
      (1994).
    url: null
    confidence: documented

  - teacher: "Sister Rosetta Tharpe"
    student: "Jerry Lee Lewis"
    source_type: interview
    citation: >
      Jerry Lee Lewis interview in "The Killer" documentary (2022).
      Lewis described hearing Tharpe play as a formative influence on
      his piano and vocal style.
    url: null
    confidence: reported

  # -------------------------------------------------------
  # BIG MAMA THORNTON
  # -------------------------------------------------------
  - teacher: "Big Mama Thornton"
    student: "Elvis Presley"
    source_type: academic
    citation: >
      Big Mama Thornton recorded "Hound Dog" (Peacock Records, recorded
      August 13, 1952, released February 1953), written by Leiber and
      Stoller specifically for her. Presley's 1956 version became the hit. Documented in Michael T. Bertrand, "Race,
      Rock, and Elvis" (University of Illinois Press, 2000).
    url: null
    confidence: documented
    notes: >
      Thornton was never inducted into the Rock and Roll Hall of Fame.
      Presley was in the first class (1986).

  - teacher: "Big Mama Thornton"
    student: "Janis Joplin"
    source_type: biography
    citation: >
      Holly George-Warren, "Janis: Her Life and Music" (Simon & Schuster,
      2019). Documents Joplin's lifelong acknowledgment of Thornton's
      influence, particularly on "Ball and Chain" which Thornton wrote
      and first recorded.
    url: null
    confidence: documented

